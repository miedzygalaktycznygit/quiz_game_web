<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="scripts" href="/script.js">
  <title>Frontend Mentor | Frontend quiz app</title>
</head>
<body>
  <div class="container">
    <div id="light_and_dark_mode">
      <div id="light_mode">
        <img src="/starter-code/assets/images/icon-sun-light.svg" alt="light mode icon">
      </div>
      <input type="checkbox" id="darkmode-toogle">
      <label for="darkmode-toogle"></label>
      <div id="dark_mode">
        <img src="/starter-code/assets/images/icon-moon-dark.svg" alt="dark mode icon">
      </div>
    </div>
    <main>
      <div class="text">
        <h1 id="h1">Welcome to the Fromtend Quiz!</h1>
        <p id="p">Pick a subject to get started.</p>
      </div>
      <div class="quiz">
        <button id="quiz_html">
          <div class="icon">
            <img src="/starter-code/assets/images/icon-html.svg" alt="html icon">
          </div>
          <h2>HTML</h2>
        </button>
        <button id="quiz_css">
          <div class="icon">
            <img src="/starter-code/assets/images/icon-css.svg" alt="css icon">
          </div>
          <h2>CSS</h2>
        </button>
        <button id="quiz_js">
          <div class="icon"> 
            <img src="/starter-code/assets/images/icon-js.svg" alt="js icon">
          </div>  
          <h2>Javascript</h2>
        </button>
        <button id="quiz_accessibility">
          <div class="icon">
            <img src="/starter-code/assets/images/icon-accessibility.svg" alt="accessibility icon">
          </div>
          <h2>Accessibility</h2>
        </button>
      </div>
    </main>
  </div>  
  <script src="/script.js" defer></script>
</body>
</html>
